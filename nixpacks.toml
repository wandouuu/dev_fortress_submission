# Nixpacks config for Railway – installs both Python and Node
[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "cd server && pip install -r requirements.txt",
  "cd web && npm install"
]

[phases.build]
cmds = ["cd web && npm run build"]

[start]
cmd = "cd server && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8787}"
